<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵犀无人机控制面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <!--
      整体说明：
      1. 这是根据 Figma 设计稿和 README 要求实现的静态网页。
      2. 使用原生 HTML5 + CSS，布局尽量还原你提供的界面。
      3. 所有重要结构和样式都加了中文注释，方便你学习和修改。
    -->
    <style>
      /* ===== 页面基础设置 ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        background: #000;
        color: rgba(255, 255, 255, 0.9);
        overflow-x: hidden;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      /* 外层容器 - 改为响应式布局 */
      .dashboard {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
        display: flex;
        flex-direction: column;
      }


      /* 中间大背景 */
      .dashboard__bg {
        position: absolute;
        inset: 0;
        background-image: none;
        background-size: cover;
        background-position: center;
        z-index: 0;
      }

      /* 整体覆盖层 */
      .dashboard__content {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 0;
      }

      .page-switch {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        display: flex;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(18, 18, 18, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(10px);
      }

      .page-switch a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.65);
        font-weight: 900;
        font-size: 12px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid transparent;
        line-height: 1;
      }

      .page-switch a.is-active {
        color: rgba(0, 0, 0, 0.9);
        background: rgba(163, 230, 53, 0.95);
        border-color: rgba(163, 230, 53, 0.35);
      }

      /* ===== 顶部栏 (透明叠层) ===== */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 28px;
        height: 60px;
        margin-bottom: 0; 
        position: relative;
        z-index: 5;
      }

      /* ... (保持之前的 topbar 相关样式，但背景改为透明) ... */
      .topbar-left, .topbar-right {
        background: transparent;
        backdrop-filter: none;
        padding: 0;
        border-radius: 0;
        border: none;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 4px;
      }

      /* ===== 叠层主体布局 ===== */
      .main-overlay {
        position: relative;
        flex: 1;
        display: grid;
        grid-template-columns: 437px 1fr 437px;
        grid-template-rows: 383px 340.2px;
        column-gap: 26px; /* 水平间距 */
        row-gap: 40px; /* 垂直间距增大 */
        padding: 20px; /* 彻底去掉左右边距 */
        margin-top: 30px;
        isolation: isolate;
        
      }

      .main-overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background: #000;
        z-index: 0;
      }

      .main-bg-media {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      .main-overlay::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 55%, rgba(0, 0, 0, 0.85) 100%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 22%, rgba(0, 0, 0, 0) 78%, rgba(0, 0, 0, 0.85) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 18%, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 1) 100%);
        pointer-events: none;
        z-index: 1;
      }

      .main-overlay > :not(.main-bg-media) {
        position: relative;
        z-index: 2;
      }

      .card-media {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        z-index: 0;
      }

      .card-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        z-index: 0;
      }

      /* 通用卡片样式：悬浮、半透明、圆角 */
      .card {
        background: rgba(18, 18, 18, 0.4);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0px;
        position: relative;
        overflow: hidden;
      }

      /* 左侧卡片 (Map) */
      .card--left {
        grid-column: 1;
        grid-row: 1;
        padding: 0;
        display: flex;
        flex-direction: column;
        border-radius: 34px;
        overflow: hidden;
      }

      .map-container {
        position: relative;
        flex: 1;
        background: transparent;
        border-radius: 34px;
        overflow: hidden;
      }

      .map-endpoint {
        position: absolute;
        width: 32px;
        height: 32px;
        transform: translate(-50%, -50%);
        display: none;
        pointer-events: none;
        filter: drop-shadow(0 0 8px #ff0000) brightness(1.5) contrast(1.2);
        z-index: 10;
      }

      .map-label {
        position: absolute;
        top: 24px;
        left: 24px;
        font-size: 32px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: 1px;
        text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      }

      .map-path-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        pointer-events: none;
      }

      .map-zoom-controls {
        position: absolute;
        bottom: 24px;
        right: 24px;
        display: flex;
        gap: 8px;
      }

      .zoom-btn {
        width: 44px;
        height: 44px;
        background: rgba(23, 23, 23, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 24px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
      }

      .zoom-btn:hover {
        background: rgba(40, 40, 40, 0.95);
      }

      /* 右侧卡片 (IR) */
      .card--right {
        grid-column: 3;
        grid-row: 1;
        padding: 0;
        border-radius: 34px;
        overflow: hidden;
      }

      /* 底部大卡片 (Status + Mission 合并) */
      .card--bottom-merged {
        grid-column: 2 / span 2;
        grid-row: 2;
        border-radius: 34px;
        padding: 24px 32px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: rgba(18, 18, 18, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .merged-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .task-info .label {
        font-size: 28px;
        font-weight: 900;
        color: #e3e3e3;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-chip {
        border: 1px solid #a3e635;
        color: #a3e635;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 900;
      }

      .task-info .value {
        font-size: 42px;
        font-weight: 900;
        color: #a3e635;
      }

      .sensor-info-merged {
        text-align: right;
      }

      .sensor-info-merged .label {
        font-size: 12px;
        color: #778292;
        font-weight: 900;
        margin-bottom: 4px;
      }

      .sensor-temp-merged {
        font-size: 32px;
        font-weight: 900;
        color: #fff;
      }

      .progress-section {
        margin: 10px 0;
      }

      .progress-row {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .progress-labels {
        display: flex;
        justify-content: center;
        margin-bottom: 10px;
      }

      .distance-val {
        position: relative;
        font-size: 30px;
        font-weight: 900;
        color: #ffffff;
        padding-left: 14px;
        letter-spacing: 0.2px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
      }

      .distance-val::before {
        content: "";
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 28px;
        border-radius: 0px;
        background: #a3e635;
      }

      .progress-bar-container {
        flex: 1;
        height: 12px;
        background: rgba(12, 16, 22, 0.75);
        border-radius: 6px;
        position: relative;
        overflow: hidden;
      }

      .progress-bar-fill {
        width: 66%;
        height: 100%;
        background: #a3e635;
        border-radius: 6px;
        box-shadow: 0 0 25px rgba(163, 230, 53, 0.5);
      }

      /*.progress-bar-fill-secondary {
        position: absolute;
        left: 66%;
        top: 0;
        height: 100%;
        width: 10%;
        background: linear-gradient(90deg, rgba(23, 55, 110, 0.95) 0%, rgba(23, 55, 110, 0.55) 100%);
        border-radius: 6px;
        opacity: 0.85;
      }*/

      .progress-mini-bars {
        display: flex;
        align-items: flex-end;
        gap: 5px;
        height: 76px;
        width: 280px;
        margin-top: -60px;
      }

      .progress-mini-bar {
        width: 18px;
        border-radius: 2px;
        background: linear-gradient(180deg, rgba(163, 230, 53, 0.95) 0%, rgba(163, 230, 53, 0.55) 100%);
        box-shadow: 0 0 12px rgba(163, 230, 53, 0.22);
      }

      .progress-mini-bar--dim {
        background: linear-gradient(180deg, rgba(163, 230, 53, 0.28) 0%, rgba(163, 230, 53, 0.12) 100%);
        box-shadow: none;
      }

      .merged-bottom {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .info-pill-merged {
        flex: 1;
        background: #1e1e1e;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid #778292;
      }

      .pill-label-merged {
        font-size: 10px;
        color: #778292;
        font-weight: 900;
        margin-bottom: 4px;
      }

      .pill-value-merged {
        font-size: 18px;
        font-weight: 900;
      }

      .pill-value-merged--green {
        color: #a3e635;
      }

      .action-icons-merged {
        display: flex;
        gap: 12px;
      }

      .icon-btn-merged {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background-color: #1a1a1a;
        border: 1px solid #333;
        background-size: 100% 100%;
        background-repeat: no-repeat;
        background-position: center;
      }

      .icon-btn-merged--camera {
        background-image: url('images/camera.png');
      }

      .icon-btn-merged--home {
        background-image: url('images/home.png');
        background-color: #d64a4b;
        border: none;
      }

      .mission-btn-merged {
        flex: 2;
        height: 54px;
        background: #a3e635;
        border: none;
        border-radius: 27px;
        color: #000;
        font-size: 22px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
      }
      .central-telemetry {
        grid-column: 2;
        grid-row: 1;
        position: relative;
        pointer-events: none;
      }

      .rgb-coord {
        position: absolute;
        top: 20px;
        left: 0;
        font-weight: 900;
        font-size: 14px;
        color: #fff;
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
      }

      .rgb-metrics {
        position: absolute;
        top: 20px;
        right: 0;
        display: flex;
        gap: 24px;
        text-align: right;
      }

      .metric-item {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .metric-label {
        font-size: 10px;
        color: rgba(255,255,255,0.7);
        font-weight: 900;
        text-transform: uppercase;
      }

      .metric-value {
        font-size: 20px;
        font-weight: 900;
      }

      .metric-value--green {
        color: #a3e635;
      }

      /* 瞄准框 
      .target-lock {
        position: absolute;
        left: 50%;
        top: 45%;
        transform: translate(-50%, -50%);
        width: 240px;
        height: 160px;
        border: 1px solid rgba(163, 230, 53, 0.3);
      }

      .target-lock::before {
        content: 'TARGET LOCKED:';
        position: absolute;
        top: -30px;
        left: 0;
        color: #a3e635;
        font-size: 12px;
        font-weight: 900;
      }

      .target-lock::after {
        content: 'DIST : 442.15m';
        position: absolute;
        bottom: -25px;
        right: 0;
        color: #a3e635;
        font-size: 12px;
        font-weight: 900;
      }
      */
      /* 画面标签 */
      .cam-tag {
        position: absolute;
        bottom: 40px;
        left: 0;
        background: #282d30;
        color: #a3e635;
        padding: 6px 14px;
        font-weight: 900;
        border-radius: 6px;
        pointer-events: auto;
      }

      .ir-temp-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 3;
        font-size: 18px;
        font-weight: 900;
        color: #ffffff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
      }

      .card--right {
        background: transparent;
      }

      .card--left-bottom {
        grid-column: 1;
        grid-row: 2;
        padding: 0;
        border-radius: 34px;
        overflow: hidden;
        background: transparent;
      }

      .depth-label {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 3;
        height: 30px;
        background: #282d30;
        color: #a3e635;
        padding: 6px 14px;
        font-weight: 900;
        border-radius: 6px;
        font-size: 13px;
        letter-spacing: 0.2px;
        text-shadow: none;
      }

      /* 火警徽标 
      .fire-badge {
        position: absolute;
        bottom: 40px;
        right: 0;
        background: #d64a4b;
        color: #fff;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: auto;
        box-shadow: 0 4px 15px rgba(214, 74, 75, 0.4);
      }


      .topbar-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      */

      /* 圆形头像区域 */
      .avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: #858585;
        overflow: hidden;
        flex-shrink: 0;
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .operator-info {
        display: flex;
        flex-direction: column;
      }

      .operator-name {
        font-weight: 900;
        font-size: 16px;
        letter-spacing: 0.5px;
      }

      .operator-subtitle {
        font-size: 12px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .sat-link {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        margin-right: 8px;
      }

      .sat-link span {
        font-size: 10px;
        font-weight: 900;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 1px;
      }

      .sat-dots {
        display: flex;
        gap: 3px;
      }

      .sat-dot {
        width: 6px;
        height: 14px;
        border-radius: 0px;
        background: #272727;
      }

      .sat-dot--active {
        background: #a3e635;
      }

      .btn-icon-square {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .btn-icon-square--bell {
        background-image: url('images/icon-bell.png');
        background-repeat: no-repeat;
        background-position: center;
        background-size: 32px 32px;
      }

      .btn-icon-square img {
        width: 24px;
        height: 24px;
        opacity: 0.9;
      }

      .btn-main {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        height: 48px;
        padding: 0 24px;
        border-radius: 12px;
        background: #212715;
        border: none;
        color: #a3e635;
        font-weight: 900;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s;
        position: relative;
      }

      .btn-main-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .btn-main-wrap::after {
        content: "";
        position: absolute;
        top: 3px;
        bottom: 3px;
        right: 0;
        width: 2px;
        background: rgba(163, 230, 53, 0.95);
        border-radius: 2px;
        box-shadow: 0 0 10px rgba(163, 230, 53, 0.35);
      }

      .btn-main:active {
        transform: scale(0.98);
      }

      .btn-main-icon {
        width: 32px;
        height: 32px;
        filter: none;
      }

      .btn-main span {
        color: #a3e635;
      }

    </style>
  </head>
  <body>
    <!--
      主容器：所有内容都在这个 .dashboard 里面
    -->
    <div class="dashboard">
      <!-- 背景图层 -->
      <div class="dashboard__bg" aria-hidden="true"></div>
      <div class="dashboard__overlay" aria-hidden="true"></div>

      <!-- 内容区域 -->
      <div class="dashboard__content">
        <nav class="page-switch" aria-label="Page switch">
          <a href="monitor.html" data-page="monitor.html">Monitor</a>
          <a href="job.html" data-page="job.html">Job</a>
          <a href="data.html" data-page="data.html">Data</a>
          <a href="ai.html" data-page="ai.html">AI</a>
        </nav>
        <!-- 顶部信息栏 -->
        <header class="topbar">
          <div class="topbar-left">
            <div class="avatar">
              <img src="images/top-avatar.png" alt="Operator Avatar" />
            </div>
            <div class="operator-info">
              <div class="operator-name">OPERATOR 01</div>
              <div class="operator-subtitle">灵犀 AIR PLANCE</div>
            </div>
          </div>

          <div class="topbar-right">
            <div class="sat-link">
              <span>GPS SAT-LINK</span>
              <div class="sat-dots">
                <div class="sat-dot sat-dot--active"></div>
                <div class="sat-dot sat-dot--active"></div>
                <div class="sat-dot sat-dot--active"></div>
                <div class="sat-dot"></div>
              </div>
            </div>
            
            <div class="btn-icon-square btn-icon-square--bell" aria-label="Notification"></div>

            <div class="btn-main-wrap">
              <button class="btn-main">
                <img
                  class="btn-main-icon"
                  src="images/icon-main-function.png"
                  alt=""
                  aria-hidden="true"
                />
                <span>Main function</span>
              </button>
            </div>
          </div>
        </header>

        <!-- 主叠层布局 -->
        <main class="main-overlay">
          <img class="main-bg-media" src="images/Main.png" alt="" aria-hidden="true" />

          <!-- 左上：地图卡片：背景 + 轨迹 + 缩放按钮 -->
          <section class="card card--left">
            <div class="map-container">
              <img class="card-media" src="images/Route.png" alt="" aria-hidden="true" />
              <div class="map-label">灵犀</div>

              <!-- 右下角缩放按钮 -->
              <div class="map-zoom-controls">
                <button class="zoom-btn" aria-label="Zoom out">−</button>
                <button class="zoom-btn" aria-label="Zoom in">+</button>
              </div>
            </div>
          </section>

          <!-- 中间：核心遥测数据 (无背景) -->
          <div class="central-telemetry">
            <div class="rgb-coord">COORD: 45°50′1.2″N  6°51′54.8</div>
            
            <div class="rgb-metrics">
              <div class="metric-item">
                <span class="metric-label">SPD</span>
                <span class="metric-value"><span id="spdVal">3.6</span> <small style="font-size: 12px; font-weight: 500;">km/h</small></span>
              </div>
              <div class="metric-item">
                <span class="metric-label">ALT</span>
                <span class="metric-value"><span id="altVal">260</span> <small style="font-size: 12px; font-weight: 500;">m</small></span>
              </div>
              <div class="metric-item">
                <span class="metric-label">BAT</span>
                <span class="metric-value metric-value--green">93%</span>
              </div>
            </div>

            <div class="cam-tag">cam-01 / RGB</div>
          </div>

          <!-- 右上：红外/树林画面 -->
          <section class="card card--right">
            <video
              class="card-video"
              src="images/Grid_video.mp4"
              autoplay
              muted
              loop
              playsinline
            ></video>
            <div class="ir-temp-badge" style="top: 15px; right: 15px;">24.5℃</div>
          </section>

          <!-- 左下：Depth 卡片（底图来自 images/Depth.png） -->
          <section class="card card--left-bottom" aria-label="Depth">
            <img class="card-media" src="images/Depth (2).png" alt="" aria-hidden="true" />
            <div class="depth-label">cam-02 / Depth</div>
          </section>

          <!-- 底部：合并卡片 (Task + Sensor + Mission) -->
          <section class="card card--bottom-merged">
            <div class="merged-top">
              <div class="task-info">
                <div class="label">
                  <span>Task Completion</span>
                  <span class="status-chip">IN PROGRESS</span>
                </div>
                <div class="value">0 %</div>
              </div>

              <div class="sensor-info-merged">
                <div class="label">SENSOR TEMPERATURE</div>
                <div class="sensor-temp-merged">34.2 °C</div>
              </div>
            </div>

            <div class="progress-section">
              <div class="progress-labels">
                <div class="distance-val">0 m</div>
              </div>
              <div class="progress-row">
                <div class="progress-bar-container" aria-hidden="true">
                  <div class="progress-bar-fill"></div>
                  <div class="progress-bar-fill-secondary"></div>
                </div>
                <div class="progress-mini-bars" aria-hidden="true">
                  <span class="progress-mini-bar progress-mini-bar--dim" style="height: 18%;"></span>
                  <span class="progress-mini-bar progress-mini-bar--dim" style="height: 28%;"></span>
                  <span class="progress-mini-bar progress-mini-bar--dim" style="height: 38%;"></span>
                  <span class="progress-mini-bar progress-mini-bar--dim" style="height: 50%;"></span>
                  <span class="progress-mini-bar" style="height: 62%;"></span>
                  <span class="progress-mini-bar" style="height: 72%;"></span>
                  <span class="progress-mini-bar" style="height: 82%;"></span>
                  <span class="progress-mini-bar" style="height: 92%;"></span>
                  <span class="progress-mini-bar" style="height: 100%;"></span>
                </div>
              </div>
            </div>

            <div class="merged-bottom">
              <div class="info-pill-merged">
                <div class="pill-label-merged">TIME ELAPSED</div>
                <div class="pill-value-merged">00 : 00</div>
              </div>
              <div class="info-pill-merged">
                <div class="pill-label-merged">AIPATHING</div>
                <div class="pill-value-merged pill-value-merged--green">OPTIMAL</div>
              </div>

              <div class="action-icons-merged" aria-label="Actions">
                <button class="icon-btn-merged icon-btn-merged--camera" aria-label="Camera"></button>
                <button class="icon-btn-merged icon-btn-merged--home" aria-label="Home"></button>
              </div>

              <button class="mission-btn-merged" aria-label="Mission">
                <span>Ⅱ</span>
                <span>Mission</span>
              </button>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script>
      (function () {
        const DRONE_CONNECTED = false;
        const DESIGN_W = 1440;
        const DESIGN_H = 900;

        function updateScale() {
          const root = document.documentElement;
          const scaleX = window.innerWidth / DESIGN_W;
          const scaleY = window.innerHeight / DESIGN_H;
          const scale = Math.min(scaleX, scaleY, 1);
          root.style.setProperty("--dashboard-scale", scale.toFixed(4));
        }

        window.addEventListener("resize", updateScale);
        updateScale();

        const current = (location.pathname.split("/").pop() || "monitor.html").toLowerCase();
        document.querySelectorAll(".page-switch a").forEach((a) => {
          const p = String(a.getAttribute("data-page") || "").toLowerCase();
          if (p === current) a.classList.add("is-active");
        });

        if (!DRONE_CONNECTED) {
          const satText = document.querySelector(".sat-link span");
          if (satText) satText.textContent = "DRONE DISCONNECTED";

          document.querySelectorAll(".sat-dot").forEach((d) => d.classList.remove("sat-dot--active"));

          document.querySelectorAll("video").forEach((v) => {
            try {
              v.pause();
              v.removeAttribute("autoplay");
              v.removeAttribute("loop");
            } catch (e) {}
          });

          const spdValEl = document.getElementById("spdVal");
          const altValEl = document.getElementById("altVal");
          const batEl = document.querySelector(".rgb-metrics .metric-value--green");
          if (spdValEl) spdValEl.textContent = "--";
          if (altValEl) altValEl.textContent = "--";
          if (batEl) batEl.textContent = "--";

          const taskValueEl = document.querySelector(".card--bottom-merged .task-info .value");
          const distanceEl = document.querySelector(".card--bottom-merged .distance-val");
          const timeElapsedEl = document.querySelector(".card--bottom-merged .pill-value-merged");
          const progressFillEl = document.querySelector(".card--bottom-merged .progress-bar-fill");
          const statusChip = document.querySelector(".card--bottom-merged .status-chip");
          if (taskValueEl) taskValueEl.textContent = "--";
          if (distanceEl) distanceEl.textContent = "--";
          if (timeElapsedEl) timeElapsedEl.textContent = "--";
          if (progressFillEl) progressFillEl.style.width = "0%";
          if (statusChip) statusChip.textContent = "DISCONNECTED";

          return;
        }

        const durationMs = 73 * 1000;
        const start = performance.now();

        const taskValueEl = document.querySelector(".card--bottom-merged .task-info .value");
        const distanceEl = document.querySelector(".card--bottom-merged .distance-val");
        const timeElapsedEl = document.querySelector(".card--bottom-merged .pill-value-merged");
        const progressFillEl = document.querySelector(".card--bottom-merged .progress-bar-fill");
        const spdValEl = document.getElementById("spdVal");
        const altValEl = document.getElementById("altVal");
        const miniBars = Array.from(
          document.querySelectorAll(".card--bottom-merged .progress-mini-bars .progress-mini-bar")
        );

        let lastMiniBarsUpdate = 0;

        function updateMiniBars(now) {
          if (miniBars.length === 0) return;
          if (now - lastMiniBarsUpdate < 260) return;
          lastMiniBarsUpdate = now;

          for (const bar of miniBars) {
            const isDim = bar.classList.contains("progress-mini-bar--dim");
            const min = isDim ? 10 : 25;
            const max = isDim ? 55 : 100;
            const h = min + Math.random() * (max - min);
            bar.style.height = `${h}%`;
          }
        }

        function formatTime(totalSeconds) {
          const m = Math.floor(totalSeconds / 60);
          const s = Math.floor(totalSeconds % 60);
          const mm = String(m).padStart(2, "0");
          const ss = String(s).padStart(2, "0");
          return `${mm} : ${ss}`;
        }

        function tick(now) {
          const t = Math.min(1, (now - start) / durationMs);
          const pct = t * 100;
          const meters = t * 53;
          const seconds = t * 73;
          const altMeters = 260 + meters;

          if (taskValueEl) taskValueEl.textContent = `${Math.round(pct)} %`;
          if (distanceEl) distanceEl.textContent = `${Math.round(meters)} m`;
          if (timeElapsedEl) timeElapsedEl.textContent = formatTime(seconds);
          if (progressFillEl) progressFillEl.style.width = `${pct}%`;
          if (spdValEl) spdValEl.textContent = "3.6";
          if (altValEl) altValEl.textContent = String(Math.round(altMeters));

          if (t < 1) updateMiniBars(now);

          if (t < 1) requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
